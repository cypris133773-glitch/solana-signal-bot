app = 'solana-signal-bot'
primary_region = 'fra'

[build]

[env]
  MIN_LIQUIDITY = '5000'
  MAX_LIQUIDITY = '100000'
  MIN_VOLUME_5M = '1000'
  MIN_BUY_COUNT = '10'
  MAX_TOP_HOLDER = '30'
  ALERT_COOLDOWN = '30'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'

[processes]
  app = "python bot.py"
