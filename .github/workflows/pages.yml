name: Deploy game to GitHub Pages

# Note: GitHub Pages must be enabled once at Settings > Pages > Source:
# "GitHub Actions" before the first successful deploy.

on:
  push:
    branches: [main]
    paths:
      - 'game/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; don't cancel an in-progress one
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        # enablement:true turns the Pages site on automatically (no manual
        # Settings step needed) as long as the workflow token can write Pages.
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload game/ as the site root
        uses: actions/upload-pages-artifact@v3
        with:
          path: game

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
